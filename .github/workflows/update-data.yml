name: Update data

# Parses public sources (IMF, surveys) on a schedule and commits any changes.
# Mirrors the Madeira Ativa GitHub Actions parser pipeline.

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # Parsers read curated tidy sources (IMF WEO, Gapminder, WHR). When those
      # local/curated files aren't present in CI, the parsers soft-skip — so this
      # job is a no-op unless run on a runner that has the sources mounted.
      # Day-to-day, run `npm run data:build` locally and commit the output.
      - name: Rebuild datasets from sources
        run: npm run data:build

      - name: Commit updated datasets
        run: |
          git config user.name "bulldozer-bot"
          git config user.email "bot@bulldozer.shpara.com"
          if [[ -n "$(git status --porcelain src/data)" ]]; then
            git add src/data
            git commit -m "data: refresh from public sources [skip ci]"
            git push
          else
            echo "No data changes."
          fi
