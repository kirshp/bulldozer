name: Deploy to shpara.com

# Builds the site and pushes dist/ into the shpara1 monorepo under bulldozer/,
# which is what Cloudflare Pages serves. Runs on every push to main or a
# working branch, so a plain `git push` reaches production automatically.
# Requires one secret — SHPARA1_DEPLOY_KEY (see .github/workflows/README-deploy.md).
on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

concurrency:
  group: deploy-shpara
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bulldozer
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push build into shpara1 (serves shpara.com/bulldozer)
        env:
          DEPLOY_KEY: ${{ secrets.SHPARA1_DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::warning::SHPARA1_DEPLOY_KEY is not set — skipping deploy."
            echo "Add the secret (see .github/workflows/README-deploy.md) to enable it."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:kirshp/shpara1.git shpara1
          rsync -a --delete dist/ shpara1/bulldozer/
          cd shpara1
          git config user.name "bulldozer-deploy[bot]"
          git config user.email "deploy@shpara.com"
          git add bulldozer
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy bulldozer @ ${GITHUB_SHA::7}"
          git push origin HEAD
